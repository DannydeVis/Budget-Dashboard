<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f2ddd2"/>
      <stop offset="100%" style="stop-color:#e8c4b0"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#bg)"/>
  <!-- Euro coin circle -->
  <circle cx="256" cy="220" r="108" fill="none" stroke="#2c2418" stroke-width="28"/>
  <!-- Euro sign -->
  <text x="256" y="270" font-family="Georgia, serif" font-size="160" font-weight="400" fill="#2c2418" text-anchor="middle">€</text>
  <!-- Bar chart at bottom -->
  <rect x="128" y="390" width="44" height="72" rx="6" fill="#c8d4c0"/>
  <rect x="192" y="358" width="44" height="104" rx="6" fill="#8aab78"/>
  <rect x="256" y="374" width="44" height="88" rx="6" fill="#c8d4c0"/>
  <rect x="320" y="342" width="44" height="120" rx="6" fill="#8aab78"/>
  <!-- Baseline -->
  <rect x="112" y="462" width="288" height="10" rx="5" fill="#a09080" opacity="0.4"/>
</svg>
